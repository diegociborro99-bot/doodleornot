  const history = useRef(null);
  if (!history.current) {
    const rng = mulberry32(hashCode(profile.name));
    history.current = Array.from({ length: 8 }, (_, i) => ({
      week: `W${i + 1}`,
      pts: Math.floor(20 + rng() * 180)
    }));
    history.current[7].pts = stats.weekPts || 0;
  }
  const maxPts = Math.max(...history.current.map(h => h.pts), 50);

  const statCards = [
    { label: 'Total points', value: stats.totalPts, icon: <CrownIcon size={24} />, tint: '#FFECE0' },
    { label: 'Games played', value: stats.gamesPlayed, icon: <WheelIcon size={24} />, tint: '#E0F5EC' },
    { label: 'Best week', value: stats.bestWeek, icon: <RainbowIcon size={24} />, tint: '#E8D5F5' },
    { label: 'This week', value: stats.weekPts, icon: <ShootingStarIcon size={24} />, tint: '#FFF4E0' }
  ];

  return (
    <div className="px-4 pt-6 pb-nav max-w-[480px] mx-auto scroll-momentum">
      {/* Cloud-shaped profile header */}
      <FrostedCard className="p-6 mb-5 text-center relative overflow-hidden anim-float-in"
                   style={{ background: `${profile.color}40`, animationDelay: '0.05s' }}>
        <div className="flex justify-center mb-3">
          <ProfileAvatar profile={profile} size={84} />
        </div>
        <h2 className="font-bold text-2xl" style={{ color: '#2D2D3F' }}>@{profile.name}</h2>
        <p className="text-xs mt-1" style={{ color: '#7B7B9A' }}>
          Joined {new Date(profile.joined).toLocaleDateString()}
        </p>
        <div className="mt-3 flex items-center justify-center gap-2 flex-wrap">
          <SoftButton onClick={onEdit}>Edit profile</SoftButton>
          {onLogout && <SoftButton onClick={onLogout}>Log out</SoftButton>}
        </div>

        {/* XP / level bar */}
        {(() => {
          const lvl = levelFromXp(xpFromPoints(stats.totalPts || 0));
          const tier = tierFromLevel(lvl.level);
          return (
            <div className="mt-5 text-left">
              <div className="flex items-center justify-between mb-1.5">
                <div className="flex items-center gap-2">
                  <span className="text-[10px] font-bold tracking-[0.18em] uppercase" style={{ color: '#7B7B9A' }}>{t('level')}</span>
                  <span className="font-display font-semibold text-xl tabular-nums" style={{ color: '#2D2D3F' }}>{lvl.level}</span>
                  <span className="rounded-full px-2 py-0.5 text-[10px] font-bold flex items-center gap-1"
                        style={{ background: `${tier.color}aa`, border: '1px solid #E8E0F0', color: '#2D2D3F' }}>
                    <span>{tier.icon}</span>{tier.name}
                  </span>
                </div>
                <span className="text-[11px] font-semibold tabular-nums" style={{ color: '#7B7B9A' }}>
                  {lvl.into} / {lvl.need} XP
                </span>
              </div>
              <div className="w-full h-2.5 rounded-full overflow-hidden" style={{ background: 'rgba(255,255,255,0.55)', border: '1px solid #E8E0F0' }}>
                <div className="h-full rounded-full transition-all"
                     style={{
                       width: `${lvl.pct}%`,
                       background: 'linear-gradient(90deg,#FFB7C5,#FFE082,#A8E6CF,#90CAF9,#C5B3E6)',
                       backgroundSize: '200% 100%',
                       animation: 'degosUnderline 4s linear infinite'
                     }} />
              </div>
            </div>
          );
        })()}
      </FrostedCard>

      {/* Streak banner */}
      <FrostedCard className="p-4 mb-5 flex items-center justify-between anim-float-in" style={{ animationDelay: '0.08s' }}>
        <div className="flex items-center gap-3">
          <span className="text-2xl">🔥</span>
          <div>
            <p className="text-[10px] font-bold tracking-[0.2em] uppercase" style={{ color: '#7B7B9A' }}>Current streak</p>
            <p className="font-display font-semibold text-xl" style={{ color: '#2D2D3F' }}>
              {streak} day{streak === 1 ? '' : 's'}
            </p>
          </div>
        </div>
        <span className="text-[11px]" style={{ color: '#7B7B9A' }}>
          {streak === 0 ? 'Play today to start one.' : 'Play every day to keep it alive.'}
        </span>
      </FrostedCard>

      <div className="grid grid-cols-2 gap-3 mb-5">
        {statCards.map((s, i) => (
          <FrostedCard key={s.label} className="p-4 anim-pop-in hover-lift"
                       style={{ background: `${s.tint}cc`, animationDelay: `${0.12 + i * 0.08}s` }}>
            <div className="mb-2">{s.icon}</div>
            <div className="font-bold text-2xl tabular-nums" style={{ color: '#2D2D3F' }}>
              <CountUp value={s.value || 0} />
            </div>
            <div className="text-xs" style={{ color: '#7B7B9A' }}>{s.label}</div>
          </FrostedCard>
        ))}
      </div>

      <FrostedCard className="p-5 mb-5">
        <div className="flex items-center gap-2 mb-4">
          <SparkleIcon size={20} fill="#FFE082" />
          <h3 className="font-bold" style={{ color: '#2D2D3F' }}>Weekly points</h3>
        </div>
        <div className="flex items-end justify-between gap-2 h-32">
          {history.current.map((h, i) => (
            <div key={h.week} className="flex-1 flex flex-col items-center gap-1">
              <div className="w-full rounded-t-lg transition-all"
                   style={{
                     background: ['#FFB7C5', '#FFAB91', '#FFE082', '#A8E6CF', '#90CAF9', '#C5B3E6', '#FFB7C5', '#FFE082'][i],
                     height: `${Math.max(6, (h.pts / maxPts) * 100)}%`,
                     border: `2px solid ${STROKE}`,
                     borderBottom: 'none'
                   }} />
              <div className="text-[10px] font-semibold" style={{ color: '#7B7B9A' }}>{h.week}</div>
            </div>
          ))}
        </div>
      </FrostedCard>

      {/* Achievements */}
      <FrostedCard className="p-5 mb-5">
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2">
            <CrownIcon size={20} />
            <h3 className="font-bold" style={{ color: '#2D2D3F' }}>Achievements</h3>
          </div>
          <span className="text-[11px] font-semibold tabular-nums" style={{ color: '#7B7B9A' }}>
            {achievements.length} / {ACHIEVEMENTS.length}
          </span>
        </div>
        <div className="grid grid-cols-2 gap-2">
          {ACHIEVEMENTS.map(a => {
            const unlocked = achievements.includes(a.id);
            const prog = unlocked ? 1 : achievementProgress(a.id, { stats, streak: { count: streak }, progress: {}, dexCount: dexIds.length });
            return (
              <div key={a.id}
                   className="rounded-xl p-2.5 transition-all"
                   style={{
                     background: unlocked ? `${a.tint}cc` : 'rgba(255,255,255,0.5)',
                     border: `1.5px solid ${unlocked ? STROKE : '#E8E0F0'}`,
                     opacity: unlocked ? 1 : 0.8,
                     filter: unlocked ? 'none' : 'grayscale(0.45)'
                   }}>
                <div className="flex items-center gap-2.5 mb-1.5">
                  <div className="w-9 h-9 rounded-lg shrink-0 flex items-center justify-center"
                       style={{ background: unlocked ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.4)',
                                border: `1px solid ${unlocked ? STROKE : '#E8E0F0'}` }}>
                    <CrownIcon size={18} />
                  </div>
                  <div className="min-w-0 flex-1">
                    <p className="text-xs font-bold truncate" style={{ color: '#2D2D3F' }}>{a.name}</p>
                    <p className="text-[10px] truncate" style={{ color: '#7B7B9A' }}>{a.desc}</p>
                  </div>
                </div>
                {!unlocked && (
                  <div className="w-full h-1 rounded-full overflow-hidden"
                       style={{ background: 'rgba(255,255,255,0.55)', border: '1px solid #E8E0F0' }}>
                    <div className="h-full" style={{ width: `${Math.round(prog * 100)}%`, background: a.tint }} />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </FrostedCard>

      {/* Doodle Dex — codex of seen Doodles */}
      <FrostedCard className="p-5 mb-5 cursor-pointer hover-lift"
                   onClick={onOpenDex}>
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2">
            <SparkleIcon size={20} fill="#C5B3E6" />
            <h3 className="font-bold" style={{ color: '#2D2D3F' }}>Doodle Dex</h3>
          </div>
          <span className="text-[11px] font-semibold tabular-nums" style={{ color: '#7B7B9A' }}>
            {dexIds.length} / {DOODLES.length}
          </span>
        </div>
        <div className="w-full h-2 rounded-full overflow-hidden mb-3"
             style={{ background: 'rgba(255,255,255,0.55)', border: '1px solid #E8E0F0' }}>
          <div className="h-full"
               style={{
                 width: `${Math.min(100, (dexIds.length / DOODLES.length) * 100)}%`,
                 background: 'linear-gradient(90deg,#C5B3E6,#90CAF9,#A8E6CF)'
               }} />
        </div>
        <p className="text-[11px]" style={{ color: '#7B7B9A' }}>
          {dexIds.length === 0
            ? 'No Doodles seen yet. Play a round to start collecting.'
            : 'Tap to open your codex and browse every Doodle you\'ve met.'}
        </p>
      </FrostedCard>

      {/* Weekly Doodle Reading (Sundays) */}
      <WeeklyReading username={profile.name}
                     stats={stats}
                     streak={streak}
                     achievements={achievements}
                     dexCount={dexIds.length} />

      <FrostedCard className="p-5 mb-5">
        <div className="flex items-center gap-2 mb-2">
          <MagnifierIcon size={20} />
          <h3 className="font-bold" style={{ color: '#2D2D3F' }}>How to play</h3>
        </div>
        <ul className="text-sm space-y-2" style={{ color: '#7B7B9A' }}>
          <li>· Three game modes unlock every day at midnight UTC.</li>
          <li>· Everyone plays the same daily challenges — same seed, fair leaderboard.</li>
          <li>· Weekly leaderboard resets every Monday 00:00 UTC.</li>
          <li>· Keep a daily streak — skipping a day resets it.</li>
        </ul>
      </FrostedCard>

      {onDelete && (
        <FrostedCard className="p-5 mb-2" style={{ background: 'rgba(229,115,115,0.08)', borderColor: 'rgba(229,115,115,0.25)' }}>
          <h3 className="font-bold mb-1" style={{ color: '#B94A4A' }}>Danger zone</h3>
          <p className="text-xs mb-3" style={{ color: '#7B7B9A' }}>
            Deletes this account and all local progress. Can't be undone.
          </p>
          {confirmDelete ? (
            <div className="flex gap-2">
              <button onClick={onDelete}
                      className="rounded-xl px-4 py-2 font-bold text-sm"
                      style={{ background: '#E57373', color: '#fff' }}>Yes, delete my account</button>
              <SoftButton onClick={() => setConfirmDelete(false)}>Cancel</SoftButton>
            </div>
          ) : (
            <button onClick={() => setConfirmDelete(true)}
                    className="rounded-xl px-4 py-2 font-bold text-sm"
                    style={{ background: 'rgba(229,115,115,0.14)', color: '#B94A4A', border: '1px solid rgba(229,115,115,0.3)' }}>
              Delete account
            </button>
          )}
        </FrostedCard>
      )}
    </div>
  );
};

   MAIN APP
   ========================================================================== */

function DoodleOrNot() {
  // ---- SESSION ----
  const [session, setSessionState] = useState(() => getSession());
  const username = session?.username || null;

  // ---- CURRENT USER (profile) ----
  const [profile, setProfile] = useState(() => {
    if (!username) return null;
    const users = getUsers();
    return users[username] || null;
  });

  const [adminMode, setAdminMode] = useState(() =>
    !!(profile && profile.isAdmin)
  );

  const [tab, setTab] = useState('home');
  const [mode, setMode] = useState(null);
  const [lastResult, setLastResult] = useState(null);

  // ---- PER-USER DATA ----
  const today = todayStr();
  const [progress, setProgress] = useState(() =>
    username ? storage.get(userProgressKey(username, today), { guess: false, price: false, trait: false })
             : { guess: false, price: false, trait: false }
  );
  const [stats, setStats] = useState(() =>
    username ? storage.get(userStatsKey(username), {
      totalPts: 0, gamesPlayed: 0, bestWeek: 0, weekPts: 0, weekKey: getWeekKey()
    }) : { totalPts: 0, gamesPlayed: 0, bestWeek: 0, weekPts: 0, weekKey: getWeekKey() }
  );
  const [streak, setStreakState] = useState(() =>
    username ? storage.get(userStreakKey(username), { count: 0, lastDate: null })
             : { count: 0, lastDate: null }
  );
  const [achievements, setAchievements] = useState(() =>
    username ? storage.get(userAchvKey(username), []) : []
  );
  const [toasts, setToasts] = useState([]);
  const [editing, setEditing] = useState(false);

  // ---- Preferences + modal state ----
  const [prefs, setPrefsState] = useState(() => getPrefs());
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [dexOpen, setDexOpen] = useState(false);
  const [showOnboarding, setShowOnboarding] = useState(false);
  const [shortcutsOpen, setShortcutsOpen] = useState(false);
  const [leaguesOpen, setLeaguesOpen] = useState(false);
  const [shareOpen, setShareOpen] = useState(false);
  const [sharePayload, setSharePayload] = useState(null);
  const [detailDoodle, setDetailDoodle] = useState(null);
  const [recapOpen, setRecapOpen] = useState(false);
  const [recapData, setRecapData] = useState(null);
  const [installable, setInstallable] = useState(false);
  const [challengeSeed, setChallengeSeed] = useState(() => readChallengeSeed());
  const [wipeTrigger, setWipeTrigger] = useState(0);
  const [prevLevel, setPrevLevel] = useState(() =>
    levelFromXp(xpFromPoints(username ? (storage.get(userStatsKey(username), { totalPts: 0 }).totalPts || 0) : 0)).level
  );

  // Apply prefs: propagate to Sound/Haptics + CSS root + dark mode
  useEffect(() => {
    Sound.setEnabled && Sound.setEnabled(prefs.sound);
    Haptics.setEnabled && Haptics.setEnabled(prefs.haptics);
    setPrefs(prefs);
    if (typeof document !== 'undefined') {
      document.documentElement.style.fontSize = `${16 * (prefs.fontScale || 1)}px`;
      document.documentElement.dataset.reducedMotion = prefs.reducedMotion ? '1' : '0';
      const mode = prefs.darkMode || 'auto';
      if (mode === 'dark') document.documentElement.dataset.theme = 'dark';
      else if (mode === 'light') document.documentElement.dataset.theme = 'light';
      else document.documentElement.dataset.theme = '';
    }
  }, [prefs]);

  // PWA install prompt availability
  useEffect(() => {
    const h = () => setInstallable(true);
    window.addEventListener('don:installable', h);
    return () => window.removeEventListener('don:installable', h);
  }, []);

  // ---- Server session auto-hydration (httpOnly cookie → state) ----
  useEffect(() => {
    if (session) return;
    const api = typeof window !== 'undefined' ? window.DON_API : null;
    if (!api) return;
    let cancelled = false;
    (async () => {
      try {
        const data = await api.me();
        if (cancelled || !data || !data.user) return;
        const u = data.user;
        const uname = u.username;
        // Mirror profile locally so the rest of the app sees it.
        const users = getUsers();
        const existing = users[uname] || {};
        const hydrated = {
          ...existing,
          username: uname,
          avatarColor: u.avatarColor || existing.avatarColor || '#C5B3E6',
          faceShape: u.faceShape || existing.faceShape || 'round',
          createdAt: existing.createdAt || Date.now(),
          isAdmin: !!existing.isAdmin
        };
        users[uname] = hydrated;
        storage.set('don:users', users);
        if (data.stats) storage.set(userStatsKey(uname), {
          totalPts: data.stats.totalPoints || 0,
          gamesPlayed: data.stats.totalGames || 0,
          bestWeek: data.stats.bestWeek || 0,
          weekPts: data.stats.weekPoints || 0,
          weekKey: getWeekKey()
        });
        if (data.streak) storage.set(userStreakKey(uname), {
          count: data.streak.currentStreak || 0,
          lastDate: data.streak.lastPlayedDay || null
        });
        if (Array.isArray(data.achievements)) storage.set(userAchvKey(uname), data.achievements);
        if (Array.isArray(data.dex)) storage.set(userDexKey(uname), data.dex);
        const sess = { username: uname, remember: true };
        setSession(sess);
        setSessionState(sess);
        setProfile(hydrated);
      } catch (_) { /* not logged in or offline — stay on auth screen */ }
    })();
    return () => { cancelled = true; };
  }, []);

  // Daily recap — show once per day on first visit
  useEffect(() => {
    if (!username) return;
    const rec = getLastRecap(username);
    if (rec.lastShown === today) return;
    // Was there activity yesterday?
    const yest = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const yProgress = storage.get(userProgressKey(username, yest), null);
    if (!yProgress) { setLastRecap(username, { lastShown: today, snapshot: null }); return; }
    const doneCount = Object.values(yProgress).filter(Boolean).length;
    if (doneCount === 0) { setLastRecap(username, { lastShown: today, snapshot: null }); return; }
    setRecapData({
      pts: stats.weekPts || 0,
      weekPts: stats.weekPts || 0,
      streak: streak.count || 0
    });
    setRecapOpen(true);
    setLastRecap(username, { lastShown: today, snapshot: { doneCount } });
  }, [username]);

  // Keyboard: '?' overlay + Esc close + 'M' mute
  useEffect(() => {
    const onKey = (e) => {
      const target = e.target;
      if (target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA')) return;
      if (e.key === '?') { e.preventDefault(); setShortcutsOpen(v => !v); }
      else if (e.key === 'Escape') {
        setShortcutsOpen(false); setSettingsOpen(false); setDexOpen(false);
        setLeaguesOpen(false); setShareOpen(false); setDetailDoodle(null); setRecapOpen(false);
      } else if (e.key === 'm' || e.key === 'M') {
        setPrefsState(p => ({ ...p, sound: !p.sound }));
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Water-wipe on tab/mode change
  useEffect(() => { setWipeTrigger(x => x + 1); }, [tab, mode, lastResult, adminMode, editing]);

  // Notifications toggle handler
  const onNotifToggle = async (v) => {
    if (!v) { setPrefsState(p => ({ ...p, notifications: false })); return; }
    const res = await requestNotifPermission();
    if (res === 'granted') {
      setPrefsState(p => ({ ...p, notifications: true }));
      scheduleDailyReminder();
    } else {
      setPrefsState(p => ({ ...p, notifications: false }));
    }
  };

  // Onboarding gate after login
  useEffect(() => {
    if (!username || (profile && profile.isAdmin)) { setShowOnboarding(false); return; }
    const done = storage.get(userOnboardedKey(username), false);
    setShowOnboarding(!done);
  }, [username, profile && profile.isAdmin]);

  const completeOnboarding = () => {
    if (username) storage.set(userOnboardedKey(username), true);
    setShowOnboarding(false);
  };

  const wipeLocalData = () => {
    try {
      const keepKeys = ['don:users', 'don:session'];
      const toDel = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('don:') && !keepKeys.includes(k)) toDel.push(k);
      }
      toDel.forEach(k => localStorage.removeItem(k));
    } catch {}
    setPrefsState({ ...DEFAULT_PREFS });
    setSettingsOpen(false);
    window.location.reload();
  };

  // Reset week if new week (per user)
  useEffect(() => {
    if (!username) return;
    const wk = getWeekKey();
    if (stats.weekKey !== wk) {
      const newStats = { ...stats, weekKey: wk, weekPts: 0,
                         bestWeek: Math.max(stats.bestWeek, stats.weekPts) };
      setStats(newStats);
      storage.set(userStatsKey(username), newStats);
    }
  }, [username]);

  const handleAuth = (user) => {
    const users = getUsers();
    const key = user.name.toLowerCase();
    const u = users[key] || user;
    setProfile(u);
    setSessionState(getSession());
    setAdminMode(!!u.isAdmin);
    // Hydrate per-user state
    setProgress(storage.get(userProgressKey(key, today), { guess: false, price: false, trait: false }));
    setStats(storage.get(userStatsKey(key), { totalPts: 0, gamesPlayed: 0, bestWeek: 0, weekPts: 0, weekKey: getWeekKey() }));
    setStreakState(storage.get(userStreakKey(key), { count: 0, lastDate: null }));
    setAchievements(storage.get(userAchvKey(key), []));
    setTab('home'); setMode(null); setLastResult(null);
  };

  const handleLogout = () => {
    setSession(null);
    setSessionState(null);
    setProfile(null);
    setAdminMode(false);
    setTab('home'); setMode(null); setLastResult(null);
  };

  const handleDeleteAccount = () => {
    if (!username || !profile || profile.isAdmin) return;
    wipeUserData(username);
    handleLogout();
  };

  const updateProfile = (patch) => {
    if (!username) return;
    const users = getUsers();
    const u = { ...(users[username] || {}), ...patch };
    users[username] = u;
    saveUsers(users);
    setProfile(u);
  };

  const finishMode = (result) => {
    if (!username) return;
    // Clutch bonus: no "wrong" or "down" icons, and at least 3 rounds played.
    const badIcons = new Set(['wrong', 'down']);
    const clean = Array.isArray(result.icons) && result.icons.length >= 3
                && !result.icons.some(i => badIcons.has(i));
    if (clean) {
      result = { ...result, points: (result.points || 0) + 2, clutch: true };
    }
    const prevProgress = progress;
    const newProgress = { ...prevProgress, [result.mode]: true };
    setProgress(newProgress);
    storage.set(userProgressKey(username, today), newProgress);

    const prevWeek = stats.weekPts;
    const newStats = {
      ...stats,
      totalPts: stats.totalPts + result.points,
      gamesPlayed: stats.gamesPlayed + 1,
      weekPts: stats.weekPts + result.points,
      bestWeek: Math.max(stats.bestWeek, stats.weekPts + result.points)
    };
    setStats(newStats);
    storage.set(userStatsKey(username), newStats);

    // ---- Streak update: bump on first completion of the day ----
    let newStreak = streak;
    const wasAnyDoneBefore = Object.values(prevProgress).some(Boolean);
    if (!wasAnyDoneBefore) {
      const last = streak.lastDate;
      if (last === today) {
        // already counted today
      } else {
        const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        const nextCount = last === yesterday ? streak.count + 1 : 1;
        newStreak = { count: nextCount, lastDate: today };
        setStreakState(newStreak);
        storage.set(userStreakKey(username), newStreak);
      }
    }

    // ---- Achievements ----
    const { all, newly } = checkAchievements({
      prev: achievements, mode: result.mode, points: result.points,
      newStats, newProgress, newStreak
    });
    if (newly.length > 0) {
      setAchievements(all);
      storage.set(userAchvKey(username), all);
      const stamped = newly.map(id => ({ id, key: id + ':' + Date.now() + Math.random() }));
      setToasts(prev => [...prev, ...stamped]);
      Sound.shimmer && Sound.shimmer();
      // Server sync — fire-and-forget
      try { window.DON_API && window.DON_API.achievementsUnlock(newly); } catch(_){}
    }

    // ---- Server sync: save progress, dex entries, streak updates ----
    try {
      if (window.DON_API) {
        const apiMode = result.mode === 'guess' ? 'higher' : result.mode === 'price' ? 'rarity' : 'trait';
        window.DON_API.saveProgress({
          mode: apiMode,
          points: result.points,
          icons: result.icons || [],
          clutch: !!result.clutch,
          day: today
        }).catch(() => {});
        if (Array.isArray(result.doodleIds) && result.doodleIds.length) {
          window.DON_API.dexAdd(result.doodleIds).catch(() => {});
        }
      }
    } catch (_) {}

    // Level-up detection
    const newLevel = levelFromXp(xpFromPoints(newStats.totalPts)).level;
    if (newLevel > prevLevel) {
      Sound.levelUp && Sound.levelUp();
      Haptics.buzz && Haptics.buzz([14, 60, 14]);
      setPrevLevel(newLevel);
    }

    setLastResult(result);
  };

  const dismissToast = (key) => setToasts(prev => prev.filter(t => t.key !== key));

  const seedBase = challengeSeed != null ? challengeSeed : hashCode(today + 'doodleornot');

  // ---- NOT LOGGED IN ----
  if (!profile) {
    return (
      <div className="min-h-app font-sans" style={{ fontFamily: "'Quicksand', sans-serif" }}>
        <FontLoader />
        <SkyBackground />
        <AuthScreen onAuth={handleAuth} />
        <FooterSignature />
      </div>
    );
  }

  // ---- ONBOARDING (first login, non-admin) ----
  if (showOnboarding && !profile.isAdmin) {
    return (
      <div className="min-h-app font-sans" style={{ fontFamily: "'Quicksand', sans-serif" }}>
        <FontLoader />
        <SkyBackground />
        <OnboardingFlow onDone={completeOnboarding} />
        <FooterSignature />
      </div>
    );
  }

  // Shared overlays for all logged-in screens
  const overlays = (
    <>
      {!prefs.reducedMotion && <ParticleOverlay />}
      <WipeTransition trigger={wipeTrigger} />
      <TopActions
        sound={prefs.sound}
        onToggleSound={() => setPrefsState(p => ({ ...p, sound: !p.sound }))}
        onSettings={() => setSettingsOpen(true)} />
      <SettingsModal
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        prefs={prefs}
        onChange={(patch) => setPrefsState(p => ({ ...p, ...patch }))}
        onWipe={wipeLocalData}
        installable={installable}
        onInstall={async () => { await promptInstall(); setInstallable(false); }}
        onNotifToggle={onNotifToggle} />
      <DexModal
        open={dexOpen}
        onClose={() => setDexOpen(false)}
        onOpenDoodle={setDetailDoodle}
        ids={username ? getDex(username) : []} />
      <DoodleDetailModal doodle={detailDoodle} onClose={() => setDetailDoodle(null)} />
      <ShortcutsOverlay open={shortcutsOpen} onClose={() => setShortcutsOpen(false)} />
      <LeaguesModal open={leaguesOpen} onClose={() => setLeaguesOpen(false)}
                    username={username} weekPts={stats.weekPts} />
      <ShareCardModal open={shareOpen} onClose={() => setShareOpen(false)} payload={sharePayload} />
      <DailyRecapModal open={recapOpen} onClose={() => setRecapOpen(false)} recap={recapData} />
    </>
  );

  // ---- ADMIN PANEL ----
  if (adminMode && profile.isAdmin) {
    return (
      <div className="min-h-app font-sans" style={{ fontFamily: "'Quicksand', sans-serif" }}>
        <FontLoader />
        <SkyBackground />
        <AppHeader />
        <AdminPanel
          profile={profile}
          onExit={() => setAdminMode(false)}
          onLogout={handleLogout}
          onEnterApp={() => setAdminMode(false)} />
        {overlays}
        <FooterSignature />
      </div>
    );
  }

  // ---- IN-GAME ----
  if (mode && !lastResult) {
    const commonHeader = (
      <div className="pt-4 px-4 max-w-[480px] mx-auto">
        <button onClick={() => setMode(null)}
                className="flex items-center gap-1 text-sm font-semibold active:scale-95"
                style={{ color: '#2D2D3F' }}>
          <ChevronLeftIcon size={18} /> Back
        </button>
      </div>
    );
    return (
      <div className="min-h-app font-sans" style={{ fontFamily: "'Quicksand', sans-serif" }}>
        <FontLoader />
        <SkyBackground />
        <AppHeader compact />
        {commonHeader}
        <div key={mode} className="anim-page-in">
          {mode === 'guess' && <GuessMode seed={seedBase} onFinish={(r) => finishMode(r)} />}
          {mode === 'price' && <PriceMode seed={seedBase} onFinish={(r) => finishMode(r)} />}
          {mode === 'trait' && <TraitMode seed={seedBase} onFinish={(r) => finishMode(r)} />}
        </div>
        <AchievementToast toasts={toasts} onDone={dismissToast} />
        {overlays}
        <FooterSignature />
      </div>
    );
  }

  // ---- RESULTS ----
  if (lastResult) {
    return (
      <div className="min-h-app font-sans" style={{ fontFamily: "'Quicksand', sans-serif" }}>
        <FontLoader />
        <SkyBackground />
        <AppHeader compact />
        <div className="pt-4 px-4 max-w-[480px] mx-auto">
          <button onClick={() => { setMode(null); setLastResult(null); }}
                  className="flex items-center gap-1 text-sm font-semibold active:scale-95"
                  style={{ color: '#2D2D3F' }}>
            <ChevronLeftIcon size={18} /> Home
          </button>
        </div>
        <div className="anim-page-in">
          <ResultsScreen result={lastResult} profile={profile}
                         onShare={() => {
                           const modeNames = { guess: 'Higher Sale', price: 'Rarity Duel', trait: 'Trait Roulette' };
                           setSharePayload({
                             modeName: modeNames[lastResult.mode] || 'Doodle',
                             points: lastResult.points,
                             icons: lastResult.icons,
                             profileName: profile.name,
                             avatarColor: profile.color || '#C5B3E6',
                             day: dayNumber(),
                             url: 'doodleornot.xyz'
                           });
                           setShareOpen(true);
                         }}
                         onChallenge={async () => {
                           const link = writeChallengeLink(seedBase);
                           try { await navigator.clipboard.writeText(link); } catch {}
                           alert(t('play_my_game') + ' — link copied.');
                         }}
                         onBack={() => { setMode(null); setLastResult(null); setTab('home'); }} />
        </div>
        <AchievementToast toasts={toasts} onDone={dismissToast} />
        {overlays}
        <FooterSignature />
      </div>
    );
  }

  // ---- EDIT PROFILE (cosmetics only now) ----
  if (editing) {
    return (
      <div className="min-h-app font-sans" style={{ fontFamily: "'Quicksand', sans-serif" }}>
        <FontLoader />
        <SkyBackground />
        <SplashScreen initial={profile} editMode onCreate={(p) => {
          updateProfile({ color: p.color, avatar: p.avatar });
          setEditing(false);
        }} />
        <FooterSignature />
      </div>
    );
  }

  // ---- MAIN APP ----
  return (
    <div className="min-h-app font-sans" style={{ fontFamily: "'Quicksand', sans-serif" }}>
      <FontLoader />
      <SkyBackground />
      <AppHeader />
      <div key={tab} className="anim-page-in">
        {tab === 'home' && (
          <HomeScreen profile={profile} progress={progress} weekPts={stats.weekPts}
                      streak={streak.count}
                      powerups={username ? getPowerups(username) : { hints: 1, skips: 1 }}
                      challengeSeed={challengeSeed}
                      onDismissChallenge={() => setChallengeSeed(null)}
                      onOpenLeagues={() => setLeaguesOpen(true)}
                      onPlay={(m) => setMode(m)} />
        )}
        {tab === 'board' && (
          <LeaderboardScreen profile={profile} weekPts={stats.weekPts} />
        )}
        {tab === 'profile' && (
          <ProfileScreen profile={profile} stats={stats}
                         streak={streak.count}
                         achievements={achievements}
                         onEdit={() => setEditing(true)}
                         onLogout={handleLogout}
                         onOpenDex={() => setDexOpen(true)}
                         onDelete={profile.isAdmin ? null : handleDeleteAccount} />
        )}
      </div>
      <AchievementToast toasts={toasts} onDone={dismissToast} />
      {overlays}
      <FooterSignature />
      <BottomNav tab={tab} onTab={setTab} />
    </div>
  );
}

        rgba(255,255,255,0) 100%
      );
      background-size: 200% 100%;
      animation: shimmerSweep 2.2s linear infinite;
    }
    .skel {
      background: linear-gradient(
        90deg,
        rgba(45,45,63,0.06) 0%,
        rgba(45,45,63,0.12) 50%,
        rgba(45,45,63,0.06) 100%
      );
      background-size: 200% 100%;
      animation: shimmerSweep 1.6s linear infinite;
      border-radius: 8px;
    }

    /* Floating sparkles behind hero titles */
    @keyframes sparkleFloat {
      0%   { transform: translate(0, 0) scale(0.6); opacity: 0; }
      25%  { opacity: 1; }
      50%  { transform: translate(var(--sx, 8px), var(--sy, -10px)) scale(1); opacity: 0.9; }
      75%  { opacity: 0.6; }
      100% { transform: translate(calc(var(--sx, 8px) * 2), calc(var(--sy, -10px) * 2)) scale(0.6); opacity: 0; }
    }
    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      pointer-events: none;
      border-radius: 50%;
      animation: sparkleFloat 3.6s ease-in-out infinite;
      will-change: transform, opacity;
      background: radial-gradient(circle, #FFF 0%, rgba(255,255,255,0.6) 40%, transparent 70%);
      box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 18px rgba(255,231,170,0.7);
    }

    /* Input focus glow — applied to all inputs/textareas */
    input:not([type="range"]):not([type="checkbox"]):not([type="radio"]),
    textarea {
      transition: box-shadow .2s ease, border-color .2s ease, background .2s ease;
    }
    input:not([type="range"]):not([type="checkbox"]):not([type="radio"]):focus,
    textarea:focus {
      outline: none;
      box-shadow:
        0 0 0 3px rgba(65,64,255,0.14),
        0 6px 18px rgba(65,64,255,0.10);
    }

    /* Card press — wraps .pressable elements for tactile feel */
    .pressable {
      transition:
        transform .22s cubic-bezier(.2,.9,.3,1.3),
        box-shadow .22s ease,
        background .2s ease;
      will-change: transform;
    }
    .pressable:active {
      transform: scale(0.98) translateY(1px);
    }
    .pressable.hover-lift:hover {
      transform: translateY(-3px) scale(1.01);
    }

    /* List stagger — automatic fade+slide for first 8 children */
    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stagger > * {
      animation: staggerIn 0.5s cubic-bezier(.2,.9,.2,1) both;
    }
    .stagger > *:nth-child(1) { animation-delay: 0.04s; }
    .stagger > *:nth-child(2) { animation-delay: 0.09s; }
    .stagger > *:nth-child(3) { animation-delay: 0.14s; }
    .stagger > *:nth-child(4) { animation-delay: 0.19s; }
    .stagger > *:nth-child(5) { animation-delay: 0.24s; }
    .stagger > *:nth-child(6) { animation-delay: 0.29s; }
    .stagger > *:nth-child(7) { animation-delay: 0.34s; }
    .stagger > *:nth-child(8) { animation-delay: 0.39s; }

    /* Morphing background blob — decorative, for hero/empty states */
    @keyframes blobMorph {
      0%,100% { border-radius: 42% 58% 63% 37% / 42% 44% 56% 58%; transform: rotate(0deg) scale(1); }
      33%     { border-radius: 58% 42% 37% 63% / 56% 65% 35% 44%; transform: rotate(60deg) scale(1.04); }
      66%     { border-radius: 63% 37% 58% 42% / 38% 53% 47% 62%; transform: rotate(-40deg) scale(0.97); }
    }
    .blob {
      position: absolute;
      pointer-events: none;
      filter: blur(28px);
      opacity: 0.45;
      animation: blobMorph 14s ease-in-out infinite;
      will-change: transform, border-radius;
    }
    .blob-a { background: radial-gradient(circle at 30% 30%, #FFB7C5 0%, transparent 70%); }
    .blob-b { background: radial-gradient(circle at 70% 50%, #C5B3E6 0%, transparent 70%); }
    .blob-c { background: radial-gradient(circle at 50% 70%, #A8E6CF 0%, transparent 70%); }

    /* Glow ring — for featured elements */
    @keyframes glowRing {
      0%,100% { box-shadow: 0 0 0 0 rgba(65,64,255,0.20), 0 6px 20px rgba(65,64,255,0.15); }
      50%     { box-shadow: 0 0 0 8px rgba(65,64,255,0), 0 8px 28px rgba(65,64,255,0.28); }
    }
    .glow-ring { animation: glowRing 2.6s ease-in-out infinite; }

    /* Icon wiggle on hover/tap */
    @keyframes iconWiggle {
      0%,100% { transform: rotate(0deg); }
      25%     { transform: rotate(-6deg); }
      75%     { transform: rotate(6deg); }
    }
    .wiggle-on-hover:hover svg,
    .wiggle-on-hover:active svg { animation: iconWiggle 0.5s ease-in-out; }

    /* Gradient text — shimmering rainbow for special values */
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }
    .gradient-text {
      background: linear-gradient(90deg, #FFB7C5, #FFE082, #A8E6CF, #90CAF9, #C5B3E6, #FFB7C5);
      background-size: 250% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientShift 5s ease-in-out infinite;
    }

    /* Breathing — subtle scale pulse for featured CTA / hero icon */
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.035); }
    }
    .breathe { animation: breathe 3.8s ease-in-out infinite; will-change: transform; }

    /* Floating arrow nudge */
    @keyframes nudgeRight {
      0%,100% { transform: translateX(0); }
      50%     { transform: translateX(3px); }
    }
    .nudge-right { animation: nudgeRight 1.6s ease-in-out infinite; }

    /* Ripple on tap (requires .ripple-target wrapper) */
    @keyframes rippleOut {
      from { transform: scale(0); opacity: 0.45; }
      to   { transform: scale(3.2); opacity: 0; }
    }
    .ripple-target { position: relative; overflow: hidden; }
    .ripple-target::after {
      content: '';
      position: absolute;
      inset: 50% auto auto 50%;
      width: 20px; height: 20px;
      margin-left: -10px; margin-top: -10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      opacity: 0;
      pointer-events: none;
    }
    .ripple-target:active::after {
      animation: rippleOut 0.6s ease-out;
    }

    /* ==========================================================
       UX LAYER — transitions, tilts, flames, toasts, skeletons
       ========================================================== */

    /* Richer page transition: slide + fade + subtle blur clear */
    @keyframes pageSlideIn {
      0%   { opacity: 0; transform: translateY(14px) scale(0.985); filter: blur(6px); }
      60%  { opacity: 1; filter: blur(0); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    .anim-page-in { animation: pageSlideIn 0.5s cubic-bezier(.2,.85,.25,1) both; }

    /* Tilt on press (touch-friendly 3D depth) — wrap cards with .tilt-card */
    .tilt-card {
      transform-style: preserve-3d;
      transform: perspective(900px) rotateX(0deg) rotateY(0deg) scale(1);
      transition:
        transform .35s cubic-bezier(.2,.9,.3,1.2),
        box-shadow .3s ease;
      will-change: transform;
    }
    .tilt-card:active {
      transform: perspective(900px) rotateX(4deg) rotateY(-2deg) scale(0.98);
    }
    @media (hover: hover) {
      .tilt-card:hover {
        transform: perspective(900px) rotateX(-2deg) rotateY(2deg) scale(1.012);
        box-shadow: 0 14px 40px rgba(65,64,255,0.14);
      }
    }

    /* Streak flame — animated gradient flame for streak >= 1 */
    @keyframes flameFlicker {
      0%,100% { transform: translateY(0) scale(1) rotate(-1deg); filter: brightness(1); }
      30%     { transform: translateY(-1px) scale(1.04) rotate(2deg); filter: brightness(1.15); }
      60%     { transform: translateY(0.5px) scale(0.97) rotate(-2deg); filter: brightness(0.95); }
      80%     { transform: translateY(-0.5px) scale(1.02) rotate(1deg); filter: brightness(1.1); }
    }
    .flame { display: inline-block; animation: flameFlicker 0.9s ease-in-out infinite; transform-origin: 50% 90%; }
    .flame-big { animation-duration: 1.1s; filter: drop-shadow(0 0 10px rgba(255,120,60,0.5)); }

    /* Toast — slide-from-top with progress bar */
    @keyframes toastSlideIn {
      from { opacity: 0; transform: translate3d(0, -18px, 0) scale(0.96); }
      to   { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
    }
    @keyframes toastSlideOut {
      from { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
      to   { opacity: 0; transform: translate3d(0, -18px, 0) scale(0.96); }
    }
    @keyframes toastProgress {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
    .toast-in  { animation: toastSlideIn  0.4s cubic-bezier(.2,.9,.3,1.2) both; }
    .toast-out { animation: toastSlideOut 0.3s ease-in forwards; }
    .toast-progress {
      height: 3px;
      background: linear-gradient(90deg, #4140FF, #C5B3E6);
      transform-origin: left;
      animation: toastProgress 3.6s linear forwards;
      border-radius: 0 0 14px 14px;
    }

    /* Skeleton variants */
    .skel-line  { height: 10px; }
    .skel-title { height: 16px; width: 60%; }
    .skel-avatar { width: 40px; height: 40px; border-radius: 50%; }

    /* Smooth tab-bar indicator (already exists) — enhance with spring */
    .nav-indicator { transition: left 0.38s cubic-bezier(.22,1.1,.36,1); }

    /* Focus-visible keyboard ring (accessibility) */
    :focus-visible {
      outline: 2px solid rgba(65,64,255,0.5);
      outline-offset: 2px;
      border-radius: 6px;
    }

    /* Scrollbar polish (webkit) */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(65,64,255,0.18);
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(65,64,255,0.32); background-clip: padding-box; }

    /* Tap burst — quick radial flash on tap (.tap-burst) */
    @keyframes tapBurst {
      0%   { box-shadow: 0 0 0 0 rgba(65,64,255,0.35); }
      100% { box-shadow: 0 0 0 18px rgba(65,64,255,0); }
    }
    .tap-burst:active { animation: tapBurst 0.45s ease-out; }

    /* Bounce-in for badges/small icons */
    @keyframes bounceIn {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); }
    }
    .anim-bounce-in { animation: bounceIn 0.5s cubic-bezier(.3,1.5,.3,1.1) both; }

    /* Gentle glow underline — for nav links on active */
    @keyframes linkGlow {
      0%,100% { text-shadow: 0 0 0 rgba(65,64,255,0); }
      50%     { text-shadow: 0 0 8px rgba(65,64,255,0.45); }
    }
    .link-glow-active { animation: linkGlow 2.4s ease-in-out infinite; }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .doodle-letter, .degos-letter, .avatar-glow, .anim-rainbow-spin-slow,
      .anim-fade-in, .anim-float-in, .anim-pop-in, .anim-page-in,
      .anim-crown-bob, .anim-score-pop, .podium-col, .confetti-piece,
      .nav-indicator, .sparkle, .blob, .glow-ring, .breathe, .nudge-right,
      .gradient-text, .shimmer, .skel, .stagger > *, .wiggle-on-hover svg,
      .btn-elastic, .pressable, .ripple-target::after,
      .tilt-card, .flame, .toast-in, .toast-out, .toast-progress,
      .anim-bounce-in, .link-glow-active, .tap-burst
        { animation: none !important; transition: none !important; }
    }
  `}</style>
);


ReactDOM.createRoot(document.getElementById('root')).render(<DoodleOrNot />);

<script>window.process = { env: { NODE_ENV: 'production' } };</script>
<script>
// SW auto-update: MUST be in index.html, not app.js — if app.js has a syntax error,
// the controllerchange listener would never register and users stay stuck forever.
(function(){
  if (!('serviceWorker' in navigator)) return;
  var refreshing = false;
  // If there's already a controller, this is a return visit (SW upgrade path).
  // If controller is null, this is a first visit — don't reload on initial install.
  var hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if (refreshing || !hadController) return;
    refreshing = true;
    window.location.reload();
  });
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      // Check for SW updates every 30 min (don't rely on browser's 24h cycle)
      setInterval(function(){ try { reg.update(); } catch(e){} }, 30 * 60 * 1000);
    }).catch(function(){});
  });
})();
</script>
<link rel="stylesheet" href="./tailwind.css" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: 'Fredoka', system-ui, sans-serif;
    color: #2D2D3F;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    overflow-x: hidden;
  }
  /* Safe area CSS variables for JS components */
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  /* Prevent iOS rubber-banding on fixed layouts */
  #root { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  /* Better touch targets on mobile */
  @media (hover: none) and (pointer: coarse) {
    button, [role="button"], a { min-height: 44px; min-width: 44px; }
    input[type="range"] { min-height: 44px; }
    input[type="range"]::-webkit-slider-thumb { width: 36px; height: 36px; }
    input[type="range"]::-moz-range-thumb { width: 36px; height: 36px; }
  }
  /* Prevent pull-to-refresh in PWA */
  @media (display-mode: standalone) {
    body { overscroll-behavior-y: none; }
  }

  /* ---------- BOOT SPLASH (visible before React mounts) ---------- */
  #boot-splash {
    position: fixed; inset: 0; z-index: 9999;
    background: radial-gradient(ellipse at 50% 20%, #FFF5D6 0%, #FFD6E0 32%, #D9C9ED 66%, #B8E0F5 100%);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    overflow: hidden;
    transition: opacity .35s ease, transform .35s ease;
  }
  #boot-splash.hiding { opacity: 0; transform: scale(1.06); pointer-events: none; }

  /* soft aurora glow */
  #boot-splash::before {
    content: ''; position: absolute; inset: -20%;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,183,197,.45), transparent 45%),
      radial-gradient(circle at 80% 60%, rgba(168,230,207,.45), transparent 45%),
      radial-gradient(circle at 50% 85%, rgba(197,179,230,.45), transparent 45%);
    animation: bsAurora 6s ease-in-out infinite alternate;
    filter: blur(20px);
  }
  @keyframes bsAurora {
    0%   { transform: translate(-2%, -1%) scale(1); }
    100% { transform: translate(2%,  1%) scale(1.04); }
  }

  /* floating clouds */
  #boot-splash .b-cloud {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,.85);
    filter: blur(.5px);
    animation: bsDrift linear infinite;
  }
  @keyframes bsDrift {
    0%   { transform: translate(-30vw,0); }
    100% { transform: translate(130vw,0); }
  }

  /* rainbow ring */
  #boot-splash .b-rainbow {
    width: 160px; height: 160px; position: relative;
    animation: bsBounce 1.6s ease-in-out infinite;
    filter: drop-shadow(0 10px 28px rgba(65,64,255,.22));
  }
  @keyframes bsBounce {
    0%,100% { transform: translateY(0)   rotate(-6deg) scale(1); }
    50%     { transform: translateY(-14px) rotate(6deg) scale(1.04); }
  }
  #boot-splash .b-rainbow svg { width:100%; height:100%; }
  #boot-splash .b-rainbow svg path {
    stroke-dasharray: 140;
    stroke-dashoffset: 140;
    animation: bsDraw 1.4s cubic-bezier(.5,.1,.2,1) forwards;
  }
  #boot-splash .b-rainbow svg path:nth-child(1) { animation-delay: 0s; }
  #boot-splash .b-rainbow svg path:nth-child(2) { animation-delay: .08s; }
  #boot-splash .b-rainbow svg path:nth-child(3) { animation-delay: .16s; }
  #boot-splash .b-rainbow svg path:nth-child(4) { animation-delay: .24s; }
  #boot-splash .b-rainbow svg path:nth-child(5) { animation-delay: .32s; }
  @keyframes bsDraw {
    to { stroke-dashoffset: 0; }
  }
  /* Orbiting pulse ring around rainbow */
  #boot-splash .b-orbit {
    position: absolute; inset: -12%;
    border-radius: 50%;
    border: 2px dashed rgba(65,64,255,.35);
    animation: bsOrbit 6s linear infinite;
  }
  @keyframes bsOrbit { to { transform: rotate(360deg); } }

  /* title */
  #boot-splash .b-title {
    margin-top: 28px;
    font-family: 'Fraunces', 'Georgia', serif;
    font-weight: 600;
    color: #2D2D3F;
    font-size: clamp(2rem, 8vw, 3rem);
    letter-spacing: -0.01em;
    text-shadow: 0 2px 18px rgba(255,255,255,.65);
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    padding: 0 16px;
    background: linear-gradient(90deg,#FFB7C5,#FFE082,#A8E6CF,#90CAF9,#C5B3E6);
    background-size: 220% 100%;
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: bsShine 4s linear infinite;
  }
  @keyframes bsShine {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  #boot-splash .b-title span {
    display: inline-block;
    opacity: 0; transform: translateY(18px) scale(.95);
    animation: bsWordIn .45s cubic-bezier(.2,.9,.3,1.3) forwards;
  }
  #boot-splash .b-title span:nth-child(1){ animation-delay:.05s; }
  #boot-splash .b-title span:nth-child(2){ animation-delay:.15s; }
  #boot-splash .b-title span:nth-child(3){ animation-delay:.25s; }
  @keyframes bsWordIn { to { opacity:1; transform: translateY(0) scale(1); } }

  /* dots */
  #boot-splash .b-dots {
    margin-top: 18px;
    display: flex; gap: 10px; align-items: center; justify-content: center;
  }
  #boot-splash .b-dots i {
    width: 10px; height: 10px; border-radius: 50%; display: block;
    animation: bsDot 1.2s ease-in-out infinite;
  }
  #boot-splash .b-dots i:nth-child(1){ background:#FFB7C5; animation-delay:0s; }
  #boot-splash .b-dots i:nth-child(2){ background:#A8E6CF; animation-delay:.15s; }
  #boot-splash .b-dots i:nth-child(3){ background:#FFE082; animation-delay:.30s; }
  #boot-splash .b-dots i:nth-child(4){ background:#C5B3E6; animation-delay:.45s; }
  #boot-splash .b-dots i:nth-child(5){ background:#90CAF9; animation-delay:.60s; }
  @keyframes bsDot {
    0%,100% { transform: translateY(0) scale(.85); opacity:.6; }
    50%     { transform: translateY(-8px) scale(1.1); opacity:1; }
  }

  /* sparkles */
  #boot-splash .b-spark {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 12px 2px rgba(255,255,255,.85);
    animation: bsSpark 2.2s ease-in-out infinite;
  }
  @keyframes bsSpark {
    0%,100% { opacity: 0; transform: scale(.6); }
    50%     { opacity: 1; transform: scale(1.2); }
  }

  @media (prefers-reduced-motion: reduce) {
    #boot-splash .b-cloud, #boot-splash .b-rainbow, #boot-splash .b-rainbow svg,
    #boot-splash .b-title span, #boot-splash .b-dots i, #boot-splash .b-spark {
      animation: none !important;
    }
    #boot-splash .b-title span { opacity:1; transform:none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Boot splash: visible while Babel compiles + React mounts -->
<div id="boot-splash" role="status" aria-label="Loading Doodle or Not">
  <div class="b-cloud" style="width:220px;height:120px;top:14%;left:-25vw;animation-duration:38s;"></div>
  <div class="b-cloud" style="width:160px;height:90px;top:62%;left:-25vw;animation-duration:52s;animation-delay:-8s;"></div>
  <div class="b-cloud" style="width:280px;height:150px;top:35%;left:-25vw;animation-duration:64s;animation-delay:-20s;opacity:.7;"></div>
  <div class="b-spark" style="top:22%;left:18%;"></div>
  <div class="b-spark" style="top:30%;right:20%;animation-delay:.4s;"></div>
  <div class="b-spark" style="bottom:28%;left:24%;animation-delay:.9s;"></div>
  <div class="b-spark" style="bottom:18%;right:18%;animation-delay:1.3s;"></div>

  <div class="b-rainbow">
    <div class="b-orbit"></div>
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 70 A40 40 0 0 1 90 70" stroke="#FFB7C5" stroke-width="8" stroke-linecap="round"/>
      <path d="M18 70 A32 32 0 0 1 82 70" stroke="#FFAB91" stroke-width="8" stroke-linecap="round"/>
      <path d="M26 70 A24 24 0 0 1 74 70" stroke="#FFE082" stroke-width="8" stroke-linecap="round"/>
      <path d="M34 70 A16 16 0 0 1 66 70" stroke="#A8E6CF" stroke-width="8" stroke-linecap="round"/>
      <path d="M42 70 A8 8 0 0 1 58 70"   stroke="#C5B3E6" stroke-width="8" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="b-title" aria-hidden="true">
    <span>Doodle</span><span>or</span><span>Not</span>
  </div>

  <div class="b-dots" aria-hidden="true">
    <i></i><i></i><i></i><i></i><i></i>
  </div>
</div>

<script>
  // Hide splash only when React actually mounts. Show errors visibly.
  (function(){
    var splash = document.getElementById('boot-splash');
    if (!splash) return;
    var root = document.getElementById('root');
    var hidden = false;
    function hide(){
      if (hidden) return; hidden = true;
      splash.classList.add('hiding');
      setTimeout(function(){ splash && splash.parentNode && splash.parentNode.removeChild(splash); }, 380);
    }
    // Poll until #root has children (React painted). No hard cap — if it hangs we want to know why.
    var iv = setInterval(function(){
      if (root && root.children && root.children.length > 0) {
        clearInterval(iv);
        setTimeout(hide, 80);
      }
    }, 60);

    // Surface any uncaught error so a white screen tells us what broke
    function showError(msg){
      try { clearInterval(iv); } catch(e){}
      var box = document.createElement('div');
      box.style.cssText = 'position:fixed;inset:12px;z-index:99999;background:#fff;border:2px solid #E57373;border-radius:14px;padding:16px;font:13px/1.5 ui-monospace,Menlo,monospace;color:#2D2D3F;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.2);';
      box.innerHTML = '<div style="font-weight:700;color:#B94A4A;margin-bottom:6px;">App failed to load</div><div style="white-space:pre-wrap;">'+ String(msg).replace(/</g,'&lt;') +'</div><div style="margin-top:10px;font-size:11px;color:#7B7B9A;">Reload the page; if it persists, clear cache (Cmd-Shift-R).</div>';
      document.body.appendChild(box);
      hide();
    }
    window.addEventListener('error', function(e){
      showError((e && e.message) + '\n' + ((e && e.filename) || '') + ':' + ((e && e.lineno) || ''));
    });
    window.addEventListener('unhandledrejection', function(e){
      showError('Promise rejection: ' + (e && e.reason && (e.reason.message || e.reason)));
    });

    // If after 8s React still hasn't mounted, show a hint
    setTimeout(function(){
      if (!hidden && (!root.children || root.children.length === 0)) {
        showError('React never mounted within 8s. Check DevTools → Console for the first red error.');
      }
    }, 8000);
  })();
</script>
<script src="./run-club.js" onerror="console.error('run-club.js failed to load');"></script>
<script src="./app.js" defer></script>
</body>
</html>
